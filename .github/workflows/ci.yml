name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-action:
    name: Test Action (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [single, multi]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create fixture chart
        run: |
          mkdir -p fixtures/charts/test-chart/templates
          cat > fixtures/charts/test-chart/Chart.yaml <<'YAML'
          apiVersion: v2
          name: test-chart
          version: 0.1.0
          appVersion: "1.0.0"
          description: CI fixture chart
          type: application
          YAML
          cat > fixtures/charts/test-chart/templates/configmap.yaml <<'YAML'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: test-chart
          data:
            hello: world
          YAML

      - name: Run action — single mode
        if: matrix.mode == 'single'
        id: single
        uses: ./
        with:
          mode: single
          chart_path: fixtures/charts/test-chart
          enable_gh_pages: false
          enable_oci_push: true
          dry_run: true
          registry_login: false
          update_appversion: false

      - name: Run action — multi mode
        if: matrix.mode == 'multi'
        id: multi
        uses: ./
        with:
          mode: multi
          charts_dir: fixtures/charts
          enable_gh_pages: false
          enable_oci_push: true
          dry_run: true
          registry_login: false

      - name: Verify outputs
        run: |
          PUSHED="${{ steps.single.outputs.pushed_charts }}${{ steps.multi.outputs.pushed_charts }}"
          SKIPPED="${{ steps.single.outputs.skipped_charts }}${{ steps.multi.outputs.skipped_charts }}"
          echo "Mode: ${{ matrix.mode }}"
          echo "pushed_charts: $PUSHED"
          echo "skipped_charts: $SKIPPED"
          if [ -n "$PUSHED" ]; then
            echo "::error::dry_run was true but pushed_charts is non-empty"
            exit 1
          fi
          if ! echo "$SKIPPED" | grep -q 'test-chart:0.1.0'; then
            echo "::error::expected 'test-chart:0.1.0' in skipped_charts (dry-run), got: $SKIPPED"
            exit 1
          fi
          echo "[PASS] ${{ matrix.mode }} mode"

  ci-result:
    name: CI Result
    if: always()
    needs: [test-action]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test-action.result }}" != "success" ]]; then
            echo "::error::CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
